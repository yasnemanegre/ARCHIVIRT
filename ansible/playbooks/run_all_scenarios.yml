# ARCHIVIRT - Run all scenarios for both IDS (master playbook, Russian metrics)
# Author: Yasnemanegre SAWADOGO (SPbGUPTD)
# Usage: ansible-playbook run_all_scenarios.yml -i ansible/inventory/hosts.ini

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-001"
- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-002"
- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-003"
- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-004"
- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-005"
- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-001"
- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-002"
- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-003"
- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-004"
- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-005"

- name: ARCHIVIRT - Calculate detection metrics
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run calculate_detection_metrics.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/calculate_detection_metrics.py

- name: ARCHIVIRT - Assemble final results
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run assemble_final_results.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/assemble_final_results.py

- name: ARCHIVIRT - Run DBSCAN analysis
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Execute dbscan_from_fetched.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/dbscan_from_fetched.py
      register: dbscan_result
    - name: Show DBSCAN result
      debug:
        msg: "{{ dbscan_result.stdout_lines }}"

- name: ARCHIVIRT - Generate final report
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run generate_report.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/generate_report.py
      register: report
    - name: Show report summary
      debug:
        msg: "{{ report.stdout_lines }}"

- name: ARCHIVIRT - Cleanup temporary files
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Remove attack start times
      file:
        path: "/tmp/attack_start_times_SCN-{{ item }}.txt"
        state: absent
      loop: [001,002,003,004,005]
    - name: Remove raw alerts
      file:
        path: "/tmp/snort3_SCN-{{ item }}_alerts.json"
        state: absent
      loop: [001,002,003,004,005]
    - name: Remove raw suricata alerts
      file:
        path: "/tmp/suricata_SCN-{{ item }}_alerts.json"
        state: absent
      loop: [001,002,003,004,005]
    - name: Remove result snippets
      file:
        path: "/tmp/snort3_SCN-{{ item }}_result.json"
        state: absent
      loop: [001,002,003,004,005]
    - name: Remove suricata result snippets
      file:
        path: "/tmp/suricata_SCN-{{ item }}_result.json"
        state: absent
      loop: [001,002,003,004,005]
    - name: Clean old backup files in project
      shell: rm -f /home/archivirt/ARCHIVIRT/ansible/playbooks/*.bak.* /home/archivirt/ARCHIVIRT/scripts/*.bak.*
